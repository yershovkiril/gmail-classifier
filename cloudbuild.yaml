steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_IMAGE_NAME}:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_IMAGE_NAME}:latest'
      - '.'

  # 2. Push the Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_IMAGE_NAME}:$COMMIT_SHA'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_IMAGE_NAME}:latest'

  # 3. Update the Cloud Run Job to use the newly built image only if it already exists
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        if gcloud run jobs describe ${_JOB_NAME} --region=${_REGION} > /dev/null 2>&1; then
          echo "Job exists. Updating with new image..."
          gcloud run jobs update ${_JOB_NAME} \
            --image ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_IMAGE_NAME}:$COMMIT_SHA \
            --region ${_REGION} \
            --command python,-m,src.main
        else
          echo "Job does not exist yet. Skipping update (Terraform will create it)."
        fi

substitutions:
  _REGION: 'us-central1'
  _REPO_NAME: 'gmail-classifier-repo'
  _IMAGE_NAME: 'gmail-agent'
  _JOB_NAME: 'gmail-classifier-job'

options:
  logging: CLOUD_LOGGING_ONLY
